name: Playwright API and UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run API and UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium only
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npx playwright test tests/api --reporter=html
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-api

      - name: Upload API report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report-api/
          if-no-files-found: error
          retention-days: 7

      - name: Run UI tests
        run: npx playwright test tests/ui --reporter=html
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-ui

      - name: Upload UI report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report-ui/
          if-no-files-found: error
          retention-days: 7
